# Dependency compatibility testing workflow.
# Tests the package with different versions of optional dependencies.
# Ensures compatibility across supported dependency version ranges.

name: Test - Dependencies
on:
  workflow_call:
  workflow_dispatch:  # to trigger manually

permissions:
  contents: read

jobs:
  # Get dependency version information from config file
  get-versions:
    uses: ./.github/workflows/get-versions.yaml

  ########################
  #     Dependencies     #
  ########################

  coola:
    needs: get-versions
    uses: ./.github/workflows/test-code-dep.yaml
    with:
      package-name: coola
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).coola) }}

  google-adk:
    needs: get-versions
    uses: ./.github/workflows/test-code-dep.yaml
    with:
      package-name: google-adk
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).google-adk) }}

  google-genai:
    needs: get-versions
    uses: ./.github/workflows/test-code-dep.yaml
    with:
      package-name: google-genai
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).google-genai) }}

  #################################
  #     Optional dependencies     #
  #################################
